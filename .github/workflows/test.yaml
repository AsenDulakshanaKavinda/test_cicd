name: Docker Compose CI/CD Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Required to access the secrets in your 'dev' environment
    environment: dev
    
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose Syntax
        run: docker compose config

      - name: Build and Start Services
        run: docker compose up -d --build

      - name: Check Container Statuses
        run: docker compose ps

      - name: Wait for API Healthcheck
        # This loop waits up to 30s for the container to report 'healthy' 
        # based on the healthcheck defined in your docker-compose.yml
        run: |
          echo "Waiting for my_chatbot_api to be healthy..."
          timeout 30s bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} $(docker compose ps -q my_chatbot_api))" == "healthy" ]; do sleep 1; done'

      - name: Run Functional Tests (Pytest)
        # Runs pytest inside the running API container
        run: docker compose exec -T my_chatbot_api pytest

      - name: Debug Logs on Failure
        if: failure()
        run: |
          docker compose logs my_chatbot_api
          docker compose logs my_chatbot_ui

      - name: Shutdown and Cleanup
        if: always()
        run: docker compose down -v