name: Test FastAPI with uv

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # This addresses the deprecation warning you received
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  PYTHONPATH: .

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Pytest
        # We use 'uv run' to ensure we use the virtualenv created by 'uv sync'
        run: uv run pytest